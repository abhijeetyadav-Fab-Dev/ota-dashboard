# Docker Compose - Local Development with PostgreSQL
# For production, use Coolify with the Dockerfile

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ota_dashboard
      - SESSION_SECRET=your-super-secret-key-change-in-production-min-32-chars
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
    command: npm run dev

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ota_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
